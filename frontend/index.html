<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPA Ventures | Deal Flow</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Link para o css-->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="text-gray-800 antialiased min-h-screen flex flex-col fade-in">
    
    <!-- NAVBAR -->
    <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <span class="font-bold text-xl text-blue-900">BPA<span class="font-light">Ventures</span></span>
                </div>
                <div>
                    <!-- Link para a tela de Login -->
                    <a href="login.html" class="text-sm font-medium text-gray-500 hover:text-blue-900 transition flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        Acesso Restrito
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="flex-grow flex flex-col items-center justify-center p-4">
        
        <!-- header -->
        <div class="text-center max-w-2xl mx-auto mb-10 mt-8">
            <span class="text-blue-600 font-semibold tracking-wider uppercase text-sm">Smart Money Deal Flow</span>
            <h1 class="text-4xl md:text-5xl font-bold mt-2 text-gray-900 leading-tight">Tem uma ideia brilhante?<br>Nós temos a execução.</h1>
            <p class="mt-4 text-gray-600 text-lg">Envie o seu documento. A nossa Inteligência Artificial fará a análise inicial.</p>
        </div>

        <!-- Forms -->
        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100 w-full max-w-md">
            <form id="formSubmission" class="space-y-4">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
                    <input type="text" id="propName" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-600 outline-none" placeholder="João Silva">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Endereço de E-mail</label>
                    <input type="email" id="propEmail" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-600 outline-none" placeholder="joao@startup.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Número de Telefone</label>
                    <input type="text" id="propPhone" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-600 outline-none" placeholder="+55 12 934567890">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Documento da Ideia (PDF/DOCX)</label>
                    <div class="mt-1 flex flex-col justify-center px-6 py-4 border-2 border-gray-300 border-dashed rounded-lg bg-gray-50 text-center">
                        <input id="propFile" name="file" type="file" class="text-sm text-gray-500 w-full" accept=".pdf,.doc,.docx" required>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="w-full py-3 mt-4 rounded-lg font-medium text-white bg-blue-900 hover:bg-blue-800 transition-colors">
                    Submeter para Análise
                </button>
            </form>

            <!-- Submission Alert -->
            <div id="submissionAlert" class="mt-4 p-4 rounded-lg hidden flex-col gap-1">
                <h3 id="submissionAlertTitle" class="font-bold text-sm"></h3>
                <p id="submissionAlertText" class="text-sm"></p>
            </div>
        </div>
    </main>

    <!--Script-->
   <script src="js/api.js"></script>

</body>
</html>
