<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Avaliador | BPA Ventures</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="text-gray-800 antialiased min-h-screen flex flex-col fade-in">
    
    <!-- NAVBAR  -->
    <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <span class="font-bold text-xl text-blue-900">BPA<span class="font-light">Ventures</span></span>
                    <span class="ml-3 px-2 py-0.5 bg-gray-100 text-gray-600 text-xs font-bold rounded-full border border-gray-200">PORTAL INTERNO</span>
                </div>
                <div>
                    <!--Logout-->
                    <a href="login.html" class="text-sm font-medium text-red-500 hover:text-red-700 transition flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        Terminar Sessão
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Dashboard -->
    <main class="flex-grow flex flex-col items-center p-4 py-8">
        
        <!-- searchbar -->
        <div class="w-full max-w-3xl mb-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold text-gray-900 mb-2">Procurar Oportunidade</h2>
                <p class="text-sm text-gray-500 mb-4">Insira o ID da oportunidade para visualizar a análise da Inteligência Artificial.</p>
                
                <form id="formSearch" class="flex gap-3">
                    <input type="number" id="searchId" required placeholder="Ex: 1" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-600 outline-none transition">
                    <button type="submit" id="btnSearch" class="bg-blue-900 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-800 transition-colors flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        Pesquisar
                    </button>
                </form>

                <!-- search error message -->
                <p id="searchError" class="text-red-500 text-sm mt-3 hidden bg-red-50 p-2 rounded border border-red-100"></p>
            </div>
        </div>

        <!-- results panel -->
        <div id="evaluatorPanel" class="w-full max-w-3xl hidden fade-in space-y-6">
            
            <!-- proponent data and veredict -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-gray-100 pb-4 mb-4">
                    <div>
                        <h3 class="text-xl font-bold text-gray-900" id="evalName">Nome</h3>
                        <p class="text-sm text-gray-500" id="evalContact">email@teste.com | +351</p>
                    </div>
                    <div id="evalStatusBadge" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide">
                        STATUS
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 text-center">
                        <p class="text-xs text-gray-500 uppercase font-bold mb-1">Score da IA</p>
                        <p class="text-3xl font-bold text-blue-900" id="evalScore">--</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 text-center">
                        <p class="text-xs text-gray-500 uppercase font-bold mb-1">Veredito Sugerido</p>
                        <p class="text-2xl font-bold text-gray-900 mt-1" id="evalVerdict">--</p>
                    </div>
                </div>
            </div>

            <!-- redflags and opportunity -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-red-700 flex items-center gap-2 mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9" />
                        </svg>
                        Red Flags (Pontos Críticos)
                    </h4>
                    <p class="text-sm text-gray-700 whitespace-pre-wrap bg-red-50 p-4 rounded-lg border border-red-100" id="evalFlags"></p>
                </div>

                <div>
                    <h4 class="text-lg font-bold text-purple-700 flex items-center gap-2 mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3" />
                        </svg>
                        Custo de Oportunidade
                    </h4>
                    <p class="text-sm text-gray-700 whitespace-pre-wrap bg-purple-50 p-4 rounded-lg border border-purple-100" id="evalCost"></p>
                </div>
            </div>

            <!-- final actions buttons -->
            <div id="actionButtons" class="flex gap-4">
                <button onclick="sendFinalDecision('APPROVED')" class="flex-1 py-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl transition-colors flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    APROVAR IDEIA
                </button>
                <button onclick="sendFinalDecision('REJECTED')" class="flex-1 py-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-colors flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    DESCARTAR
                </button>
            </div>

            <!-- success message -->
            <div id="actionFeedback" class="hidden p-4 rounded-lg text-center font-bold"></div>

        </div>
    </main>

    <script src="js/evaluator.js"></script>

</body>
</html>
