<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Avaliador | BPA Ventures</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="text-gray-800 antialiased min-h-screen flex flex-col fade-in">

    
    <!-- NAVBAR -->
    <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <span class="font-bold text-xl text-blue-900">BPA<span class="font-light">Ventures</span></span>
                </div>
                <div>
                    
                    <a href="index.html" class="text-sm font-medium text-gray-500 hover:text-blue-900 transition flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Voltar ao Início
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- login area -->
    <main class="flex-grow flex flex-col items-center justify-center p-4">
        
        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100 w-full max-w-sm text-center">
            
            <!-- cadeado em svg-->
            <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-blue-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>

            <h2 class="text-2xl font-bold text-gray-900 mb-2">Acesso Restrito</h2>
            <p class="text-gray-500 text-sm mb-6">Área exclusiva para a equipa de avaliação da BPA Ventures.</p>

            <form id="formLogin" class="space-y-4">
                <div>
                    <input type="password" id="adminPassword" required class="w-full border border-gray-300 text-center rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-600 outline-none transition" placeholder="Palavra-passe">
                </div>
                
                <button type="submit" class="w-full py-3 rounded-lg font-medium text-white bg-blue-900 hover:bg-blue-800 transition-colors flex justify-center items-center gap-2">
                    Entrar no Sistema
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>

            <!-- login error -->
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden bg-red-50 p-2 rounded border border-red-100">
                Palavra-passe incorreta. Tente "admin123".
            </p>

        </div>
    </main>

    <script src="js/auth.js"></script>

</body>
</html>
